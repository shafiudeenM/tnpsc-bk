services:
  - type: web
    name: tnpsc-guru-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: tnpsc_chunks
      - key: EMBEDDING_MODEL
        value: Xenova/all-MiniLM-L6-v2
      - key: EMBEDDING_DIM
        value: "384"
      - key: FRONTEND_URL
        sync: false
    disk:
      name: model-cache
      mountPath: /opt/render/project/src/backend/models
      sizeGB: 1
